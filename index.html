<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Seat Finder</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Find Your Seat</h1>

    <input type="text"
       id="guestName"
       list="guestSuggestions"
       placeholder="Enter your name">

    <datalist id="guestSuggestions">
    </datalist>

    <button onclick="findSeat()">
        Find Table
    </button>

    <p id="result"></p>

</div>

<script src="script.js"></script>

</body>
</html>
