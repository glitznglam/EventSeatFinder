<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <h2 id="eventName">Sarah & Michael's Wedding</h2>
    <p id="venueName">Grand Ballroom • Colombo</p>
    <title>Event Seat Finder</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- SEARCH SCREEN -->
    <div class="container">

        <h1>Find Your Seat</h1>

        <div class="search-container">

            <input
                type="text"
                id="guestName"
                placeholder="Enter your name"
                autocomplete="off">

            <div id="suggestions" class="suggestions-box"></div>

        </div>

        <button onclick="findSeat()">
            Find Table
        </button>

        <p id="result"></p>

    </div>

    <!-- RESULT SCREEN -->
   <div id="resultCard" class="result-card" style="display:none;">

    <h1>Your Seat Awaits</h1>

    <div id="guestDisplay"></div>

    <p id="tableDisplay"></p>

    <img id="floorPlanImage"
         src="floorplan.jpg"
         alt="Floor Plan">

    <button onclick="closeResult()">
        Close
    </button>

</div>

    <script src="script.js"> </script>

</body>
</html>
